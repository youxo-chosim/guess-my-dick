<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;overflow:hidden;position:relative}
/* Blurred emoji background */
.bg-emoji{position:absolute;font-size:120px;filter:blur(6px);opacity:.2}
.e1{top:40px;left:80px;transform:rotate(-15deg)}
.e2{top:350px;left:150px;transform:rotate(20deg)}
.e3{top:80px;right:120px;transform:rotate(10deg)}
.e4{bottom:60px;right:180px;transform:rotate(-25deg)}
.e5{top:250px;left:500px;transform:rotate(5deg);font-size:90px}
.e6{bottom:40px;left:450px;transform:rotate(-10deg);font-size:100px}
/* Content */
.card{text-align:center;color:#fff;position:relative;z-index:1}
.title{font-size:100px;font-weight:900;line-height:1}
.title span{display:block;font-size:130px;background:linear-gradient(135deg,#dc2626,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:36px;margin-top:20px;color:#aaa;font-weight:500}
.url{font-size:20px;color:#555;margin-top:28px;letter-spacing:2px}
</style></head>
<body>
<div class="bg-emoji e1">🍆</div>
<div class="bg-emoji e2">🥵</div>
<div class="bg-emoji e3">🌶️</div>
<div class="bg-emoji e4">👀</div>
<div class="bg-emoji e5">🍌</div>
<div class="bg-emoji e6">🔥</div>
<div class="card">
  <div class="title">GUESS MY<span>DICK</span></div>
  <div class="sub">까기 전엔 아무도 모른다<br><span style="color:#dc2626">하지만 우린 안다</span></div>
  <div class="url">hot.chosim.me</div>
</div>
</body></html>
