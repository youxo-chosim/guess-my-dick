}

function decodeGroup(encoded) {
  try {
    const data = decodeURIComponent(escape(atob(encoded)));
    return data.split(',').filter(Boolean).map(e => {
      const [name, size] = e.split('|');
      return { name, size: parseFloat(size) };
    });
  } catch { return []; }
}

// ============ RESULT STATE ============
let resultData = null;

function loadResult() {
  try {
    const raw = localStorage.getItem('gmd-result');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function renderResult(data) {

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="result-screen">

        <div class="result-name">${name}${RT.result_of}</div>
        <div class="result-object-emoji fade-in fade-in-d1">${obj.emoji}</div>
        <div class="result-specs fade-in fade-in-d1">
          <div class="result-spec">
            <div class="result-spec-val">${size}</div>
            <div class="result-spec-label">${RT.length_cm}</div>
          </div>
          <div class="result-spec" style="color:#555;font-size:24px;padding-top:4px">×</div>

              </div>
            </div>
          `).join('')}
        </div>
        <div class="result-disclaimer">${RT.disclaimer}</div>

      </div>
      <div class="ranking-section fade-in fade-in-d3" id="ranking-section" style="display:none">

      <div class="share-buttons fade-in fade-in-d4">
        <button class="btn btn-primary" onclick="shareChallenge()">${RT.share_btn}</button>

        <button class="btn btn-secondary" onclick="shareImage()">${RT.save_img}</button>
        <button class="btn btn-secondary btn-small" onclick="location.href='index.html'">${RT.restart}</button>

  `;

  // Animate percentile bar
  setTimeout(() => {

function renderRanking(myName, mySize, group) {
  if (!group || group.length <= 1) return;
  const section = document.getElementById('ranking-section');
  const list = document.getElementById('ranking-list');
  if (!section || !list) return;

  const medals = ['gold', 'silver', 'bronze'];
  const icons = ['👑', '🥈', '🥉'];

  list.innerHTML = group.map((m, i) => `
    <div class="ranking-item ${m.name === myName ? 'me' : ''}">
      <div class="ranking-pos ${medals[i] || ''}">${i < 3 ? icons[i] : (i+1)}</div>
      <div class="ranking-name">${m.name} ${m.name === myName ? RT.me : ''}</div>
      <div class="ranking-size">${m.size}cm</div>
    </div>
  `).join('');

  section.style.display = 'block';
}

function showFallback() {
  document.getElementById('app').innerHTML = `
    <div class="fallback">
      <div style="font-size:64px">🍆</div>
      <h2>결과를 찾을 수 없어요</h2>
      <p>측정을 완료하면 결과가 여기에 표시됩니다</p>
      <button class="btn btn-primary" onclick="location.href='index.html'" style="max-width:280px">측정하러 가기</button>
    </div>
  `;
}

async function shareChallenge() {
  if (!resultData) return;
  track('share_challenge', { score: resultData.totalScore, size: resultData.size });
  const { group, size, girth, percentile } = resultData;
  const obj = getObject(size);
  const encoded = encodeGroup(group || []);
  const base = window.location.origin + window.location.pathname.replace('result.html', 'index.html');
  const url = base + (encoded ? '?g=' + encoded : '');
  const text = `${obj.emoji} "${obj.name}" ${RT.share_size}\n${RT.share_top}${100 - percentile}%!\n\n${RT.share_text_suffix}`;

  if (navigator.share) {
    try {
      await navigator.share({ text: text + '\n' + url });
      return;
    } catch {}
  }
  try {
    await navigator.clipboard.writeText(text + '\n' + url);
    alert(RT.link_copied);
  } catch {
    prompt(RT.link_prompt, url);
  }
}

async function shareImage() {
  if (!resultData) return;
  track('share_image', { score: resultData.totalScore, size: resultData.size });
  try {
    const { name, size, girth, totalScore, percentile } = resultData;
    const obj = getObject(size);
    const comment = getComment(percentile);

    // Helper: rounded rect without roundRect API
    function rr(ctx,x,y,w,h,r){
      ctx.moveTo(x+r,y);
      ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();
    }

    const W = 750, H = 1100;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.textAlign = 'center';

    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Card bg
    ctx.fillStyle = '#141414';
    ctx.beginPath(); rr(ctx, 40, 30, W-80, H-60, 24); ctx.fill();

    // Border
    ctx.strokeStyle = '#dc2626';
    ctx.lineWidth = 2;
    ctx.beginPath(); rr(ctx, 40, 30, W-80, H-60, 24); ctx.stroke();

    // Name
    ctx.fillStyle = '#888';
    ctx.font = '600 26px sans-serif';
    ctx.fillText(name + '의 분석 결과', W/2, 90);

    // Emoji
    ctx.font = '100px sans-serif';
    ctx.fillText(obj.emoji, W/2, 210);

    // Size × Girth
    ctx.fillStyle = '#dc2626';
    ctx.font = '900 64px sans-serif';
    ctx.fillText(String(size), W/2 - 85, 310);
    ctx.fillStyle = '#555';
    ctx.font = '400 36px sans-serif';
    ctx.fillText('×', W/2, 305);
    ctx.fillStyle = '#dc2626';
    ctx.font = '900 64px sans-serif';
    ctx.fillText(String(girth), W/2 + 85, 310);

    ctx.fillStyle = '#888';
    ctx.font = '400 20px sans-serif';
    ctx.fillText('길이 (cm)', W/2 - 85, 340);
    ctx.fillText('둘레 (cm)', W/2 + 85, 340);

    // Total score
    ctx.fillStyle = '#666';
    ctx.font = '400 22px sans-serif';
    ctx.fillText('총점', W/2, 400);
    ctx.fillStyle = '#f59e0b';
    ctx.font = '900 80px sans-serif';
    ctx.fillText(String(totalScore), W/2 - 30, 490);
    ctx.fillStyle = '#555';
    ctx.font = '400 28px sans-serif';
    ctx.fillText('/ 100', W/2 + 60, 485);

    // Object name
    ctx.fillStyle = '#fff';
    ctx.font = '800 32px sans-serif';
    ctx.fillText('"' + obj.name + '" 사이즈', W/2, 560);
    ctx.fillStyle = '#999';
    ctx.font = '400 22px sans-serif';
    ctx.fillText(obj.desc, W/2, 595);

    // Divider
    ctx.fillStyle = '#333';
    ctx.fillRect(W/2 - 40, 625, 80, 2);

    // Percentile
    ctx.fillStyle = '#888';
    ctx.font = '400 20px sans-serif';
    ctx.fillText('전 세계 남성 기준', W/2, 665);
    ctx.fillStyle = '#dc2626';
    ctx.font = '900 44px sans-serif';
    ctx.fillText('상위 ' + (100 - percentile) + '%', W/2, 720);

    // Percentile bar (simple rect, no roundRect)
    ctx.fillStyle = '#222';
    ctx.fillRect(100, 745, W - 200, 12);
    const grad = ctx.createLinearGradient(100, 0, W - 100, 0);
    grad.addColorStop(0, '#f59e0b'); grad.addColorStop(1, '#dc2626');
    ctx.fillStyle = grad;
    ctx.fillRect(100, 745, (W - 200) * percentile / 100, 12);

    // Comment box
    ctx.fillStyle = '#1e1010';
    ctx.beginPath(); rr(ctx, 80, 785, W - 160, 80, 14); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '800 24px sans-serif';
    ctx.fillText(comment.text, W/2, 822);
    ctx.fillStyle = '#aaa';
    ctx.font = '400 18px sans-serif';
    ctx.fillText(comment.sub, W/2, 850);

    // Disclaimer
    ctx.fillStyle = '#555';
    ctx.font = '400 16px sans-serif';
    ctx.fillText('* 발기 시 기준 예측 · 엔터테인먼트 목적', W/2, 940);
    ctx.fillStyle = '#444';
    ctx.font = '600 18px sans-serif';
    ctx.fillText('GUESS MY DICK', W/2, 975);
    ctx.fillStyle = '#555';
    ctx.font = '400 16px sans-serif';
    ctx.fillText('hot.chosim.me', W/2, 1005);

    // Convert to data URL (more compatible than toBlob on mobile)
    const dataUrl = canvas.toDataURL('image/png');

    // Try share as file first
    try {
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], 'guess-my-dick.png', { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
          return;
        }
      }
    } catch(e) { console.log('Share file failed, trying download:', e); }

    // Fallback: download via link
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `guess-my-dick-${resultData.name || 'result'}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    console.error('Image save error:', e);
    alert(RT.img_fail + ': ' + (e.message || e));
  }
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', () => {
  resultData = loadResult();
  if (!resultData) {
    showFallback();
    return;
  }
  renderResult(resultData);
  track('result_page_viewed', {
    size: resultData.size,
    girth: resultData.girth,
    total_score: resultData.totalScore,
    percentile: resultData.percentile
  });
});
</script>
